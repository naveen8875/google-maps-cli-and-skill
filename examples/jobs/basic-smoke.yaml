name: austin-basic-smoke
seeds:
  - query: dentists in Austin TX
    region: Austin, Texas
    full_scroll: true
    max_results: 5
browser:
  backend: selenium
  headless: true
proxy:
  mode: direct
output:
  directory: runs
  filename: austin-basic-smoke.csv
  checkpoint_filename: checkpoint.json
  write_manifest: true
options:
  dedupe_by: url
  continue_on_error: false
